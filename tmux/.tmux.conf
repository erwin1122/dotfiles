# Inherit PATH so TPM can find git and other tools
set-environment -g PATH "/home/naer/.local/share/mise/shims:/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/bin/site_perl:/usr/bin/vendor_perl:/usr/bin/core_perl:/home/naer/.local/bin"

# Default shell
set-option -g default-shell /home/naer/.local/share/mise/shims/fish

# Set leader key to Ctrl+Space
unbind C-b
set -g prefix C-a

# Refresh and send message with "r"
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

set -g mouse on

# v and h are not bound by default, but we never know in the next versions...
unbind v
unbind h
unbind % # Split vertically
unbind '"' # Split horizontally
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

# select panes with prefix + HJKL (bare C-hjkl handled by vim-tmux-navigator below)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Greater histroy limit
set -g history-limit 100000

# Close pane (or window if last pane) with prefix + q
bind q kill-pane

# Binds for new window and renaming window
unbind n  #DEFAULT KEY: Move to next window
unbind w  #DEFAULT KEY: change current window interactively
bind w command-prompt "rename-window '%%'"
bind n new-window -c "#{pane_current_path}"

# Start indices at 1
set -g base-index 1
set-window-option -g pane-base-index 1

# Set vim keys for copy mode
set-window-option -g mode-keys vi

# Set vim binds for selcting and copy to clipboard
unbind -T copy-mode-vi Space; #Default for begin-selection
unbind -T copy-mode-vi Enter; #Default for copy-selection
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel --clipboard"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"


# TPM & Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'janoamaral/tokyo-night-tmux'

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"
set -g xterm-keys on
set -g extended-keys on
set -as terminal-features ",xterm-256color:extkeys,tmux-256color:extkeys"

# Theme Widgets (optional)
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_pane_id_style hide
set -g @tokyo-night-tmux_show_battery_widget 1
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format full
set -g @tokyo-night-tmux_show_hostname 0
set -g @tokyo-night-tmux_theme storm
set -g @tokyo-night-tmux_transparent 1

# TPM starten
if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' \
  "run-shell '~/.tmux/plugins/tpm/tpm'" \
  "run-shell '/usr/share/tmux-plugin-manager/tpm'"
