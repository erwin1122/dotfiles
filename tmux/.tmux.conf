# Inherit PATH so TPM can find git and other tools
set-environment -g PATH "/home/naer/.local/share/mise/shims:/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/bin/site_perl:/usr/bin/vendor_perl:/usr/bin/core_perl:/home/naer/.local/bin"

# Default shell
set-option -g default-shell /usr/bin/fish

# Set leader key to Ctrl+a
unbind C-b
set -g prefix C-a

# Refresh and send message with "r"
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

set -g mouse on

# Refresh status line frequently so path widgets update faster
set -g status-interval 1

# Split panes with prefix+h (horizontal) and prefix+v (vertical)
unbind v
unbind h
unbind % # Split vertically
unbind '"' # Split horizontally
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Greater history limit
set -g history-limit 100000

# Close pane (or window if last pane) with prefix + q
bind q kill-pane

# Binds for new window and renaming window
unbind n  #DEFAULT KEY: Move to next window
unbind w  #DEFAULT KEY: change current window interactively
bind w command-prompt "rename-window '%%'"
bind n new-window -c "#{pane_current_path}"

# Start indices at 1
set -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set vim keys for copy mode
set-window-option -g mode-keys vi

# Set vim binds for selecting and copy to clipboard
unbind -T copy-mode-vi Space; #Default for begin-selection
unbind -T copy-mode-vi Enter; #Default for copy-selection
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel --clipboard"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# Auto-name new sessions as session-0, session-1, ...
# tmux names sessions 0, 1, 2 by default — prepend "session-"
set-hook -g session-created 'rename-session "session-#{session_name}"'

# ─────────────────────────────────────────────────────────────────────────────
# Color Palette — One Dark
# To switch themes, change the hex values in this section only.
# ─────────────────────────────────────────────────────────────────────────────
set -g @col_bg        "#282c34"
set -g @col_bg_dark   "#21252b"
set -g @col_fg        "#abb2bf"
set -g @col_comment   "#5c6370"
set -g @col_red       "#e06c75"
set -g @col_green     "#00916C"
set -g @col_yellow    "#e5c07b"
set -g @col_blue      "#61afef"
set -g @col_purple    "#c678dd"
set -g @col_cyan      "#56b6c2"

# ─────────────────────────────────────────────────────────────────────────────
# Status bar — single line
# Layout: [prefix · session-name] [windows] ... [cwd]
# ─────────────────────────────────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-style "bg=#{@col_bg},fg=#{@col_fg}"

# Prefix indicator via session-name color only
# Normal: session name gray; Prefix active: session name blue
set -g status-left "#[fg=#{?client_prefix,#{@col_blue},#{@col_comment}}]#{?client_prefix,#[bold],#[nobold]} #{session_name} #[fg=#{@col_comment}]│ "
set -g status-left-length 40

# CWD (right)
set -g status-right "#[fg=#{@col_cyan}] #{pane_current_path} "
set -g status-right-length 80

# Windows: active = green, last-used dot = cyan
set -g status-justify left
set -g window-status-format         "#[fg=#{@col_comment},none] #{window_index}:#{window_name}#{?window_last_flag,#[fg=#{@col_cyan}] ·,  } "
set -g window-status-current-format "#[fg=#{@col_green},bold] #{window_index}:#{window_name}   "
set -g window-status-style          "bg=#{@col_bg}"
set -g window-status-current-style  "bg=#{@col_bg}"

# ─────────────────────────────────────────────────────────────────────────────
# Terminal & cursor settings
# ─────────────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"

# Blinking block cursor in tmux (e.g. copy/select mode)
set -g cursor-style blinking-block
# Forward cursor sequences to outer terminal (for fish, nvim, etc.)
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -g xterm-keys on
set -g extended-keys on
set -as terminal-features ",xterm-256color:extkeys,tmux-256color:extkeys"

# ─────────────────────────────────────────────────────────────────────────────
# TPM — only tpm itself, no theme plugins
# ─────────────────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'

if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' \
  "run-shell '~/.tmux/plugins/tpm/tpm'" \
  "run-shell '/usr/share/tmux-plugin-manager/tpm'"
